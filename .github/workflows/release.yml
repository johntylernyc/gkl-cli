name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: gkl-linux-amd64
          - os: windows-latest
            artifact_name: gkl-windows-amd64.exe
          - os: macos-latest
            artifact_name: gkl-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Embed version from tag
        shell: bash
        run: echo "__version__ = \"${GITHUB_REF_NAME#v}\"" > gkl/_version.py

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install .

      - name: Build executable
        shell: bash
        run: |
          pyinstaller --onefile --console --name gkl \
            --collect-all textual \
            --collect-all textual_plotext \
            --collect-data certifi \
            --hidden-import concurrent.futures \
            --hidden-import csv \
            --hidden-import io \
            --hidden-import markdown_it \
            --hidden-import mdit_py_plugins \
            --hidden-import linkify_it \
            --hidden-import uc_micro \
            gkl_entry.py

      - name: Rename artifact (Linux/macOS)
        if: runner.os != 'Windows'
        run: mv dist/gkl dist/${{ matrix.artifact_name }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: mv dist/gkl.exe dist/${{ matrix.artifact_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          body: |
            ## Installation

            Download the file for your operating system from the **Assets** section below.

            ### macOS

            1. Download **gkl-macos-arm64**
            2. Open **Terminal** (Applications > Utilities > Terminal)
            3. Navigate to where the file was downloaded:
               ```
               cd ~/Downloads
               ```
            4. Make the file executable:
               ```
               chmod +x gkl-macos-arm64
               ```
            5. Run it:
               ```
               ./gkl-macos-arm64
               ```

            > **Note:** If macOS shows a security warning, right-click the file in Finder, select **Open**, and confirm. Or run: `xattr -d com.apple.quarantine gkl-macos-arm64`

            ### Windows

            1. Download **gkl-windows-amd64.exe**
            2. Open **Command Prompt** or **PowerShell** (search "cmd" or "PowerShell" in the Start menu)
            3. Navigate to where the file was downloaded:
               ```
               cd %USERPROFILE%\Downloads
               ```
            4. Run it:
               ```
               gkl-windows-amd64.exe
               ```

            ### Linux

            1. Download **gkl-linux-amd64**
            2. Open a terminal
            3. Navigate to where the file was downloaded:
               ```
               cd ~/Downloads
               ```
            4. Make the file executable and run it:
               ```
               chmod +x gkl-linux-amd64
               ./gkl-linux-amd64
               ```

            ## First-Time Setup

            On the first run, the app will guide you through creating Yahoo API credentials:

            1. Go to https://developer.yahoo.com/apps/create/
            2. Fill in the following:
               - **Application Name:** Choose a name for your application
               - **Description:** A terminal application for managing my fantasy baseball roster
               - **Homepage URL:** Your personal website if you have one, otherwise choose a website (must be formatted as `https://www.yourwebsitename.com`)
               - **Redirect URI:** `https://localhost:8080`
               - **OAuth Client Type:** Confidential Client
               - **API Permissions:** Fantasy Sports (Read)
            3. After creating the app, Yahoo will provide a **Client ID** and **Client Secret** — paste these into the app when prompted
            4. The app will open your browser to authorize access to your Yahoo Fantasy league — approve the request and paste the verification code back into the app

            Your credentials are saved locally so you only need to do this once.
