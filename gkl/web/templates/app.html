<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GKL Baseball</title>
    <link rel="stylesheet" href="/static/css/xterm.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1b26;
            color: #c0caf5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.4rem 1rem;
            background: #16161e;
            border-bottom: 1px solid #2a2b3d;
            font-size: 0.85rem;
            flex-shrink: 0;
        }
        .topbar-left { color: #7aa2f7; font-weight: 500; }
        .topbar-right { display: flex; gap: 1rem; align-items: center; }
        .topbar a {
            color: #565f89;
            text-decoration: none;
            transition: color 0.2s;
        }
        .topbar a:hover { color: #c0caf5; }
        .user-name { color: #9ece6a; }
        #terminal-container {
            flex: 1;
            overflow: hidden;
        }
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #565f89;
            font-size: 1.1rem;
        }
        .disconnected {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1b26;
            border: 1px solid #3b4261;
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            z-index: 100;
        }
        .disconnected h2 { color: #f7768e; margin-bottom: 0.5rem; }
        .disconnected a {
            color: #7aa2f7;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-left">GKL Baseball</div>
        <div class="topbar-right">
            <span class="user-name">{{ user_name }}</span>
            <a href="/logout">Logout</a>
        </div>
    </div>

    <div id="terminal-container">
        <div class="loading" id="loading">Connecting...</div>
    </div>

    <div class="disconnected" id="disconnected">
        <h2>Session Ended</h2>
        <p>Your terminal session has ended.</p>
        <p><a href="/app">Reconnect</a> | <a href="/logout">Logout</a></p>
    </div>

    <script src="/static/js/textual.js"></script>
    <script>
        (function() {
            const container = document.getElementById("terminal-container");
            const loading = document.getElementById("loading");
            const disconnected = document.getElementById("disconnected");

            const protocol = location.protocol === "https:" ? "wss:" : "ws:";
            const wsUrl = `${protocol}//${location.host}/ws`;
            const ws = new WebSocket(wsUrl);

            let gotFirstByte = false;

            ws.binaryType = "arraybuffer";

            ws.onopen = function() {
                loading.textContent = "Starting app...";
                // Send initial terminal size
                const width = Math.floor(container.clientWidth / 8);
                const height = Math.floor(container.clientHeight / 16);
                ws.send(JSON.stringify(["resize", {"width": width, "height": height}]));
            };

            ws.onmessage = function(event) {
                if (!gotFirstByte) {
                    gotFirstByte = true;
                    loading.style.display = "none";
                }
            };

            ws.onclose = function() {
                disconnected.style.display = "block";
            };

            ws.onerror = function() {
                loading.textContent = "Connection failed. Please try again.";
            };

            // Keep alive
            setInterval(function() {
                if (ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify(["ping", Date.now()]));
                }
            }, 30000);

            // Handle window resize
            window.addEventListener("resize", function() {
                if (ws.readyState === WebSocket.OPEN) {
                    const width = Math.floor(container.clientWidth / 8);
                    const height = Math.floor(container.clientHeight / 16);
                    ws.send(JSON.stringify(["resize", {"width": width, "height": height}]));
                }
            });

            // Handle focus/blur
            window.addEventListener("focus", function() {
                if (ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify(["focus"]));
                }
            });
            window.addEventListener("blur", function() {
                if (ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify(["blur"]));
                }
            });
        })();
    </script>
</body>
</html>
