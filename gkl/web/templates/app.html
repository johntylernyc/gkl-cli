<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GKL Baseball</title>
    <link rel="stylesheet" href="/static/css/xterm.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="/static/js/textual.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1b26;
            color: #c0caf5;
            font-family: "Roboto Mono", monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.4rem 1rem;
            background: #16161e;
            border-bottom: 1px solid #2a2b3d;
            font-size: 0.85rem;
            flex-shrink: 0;
            z-index: 10;
        }
        .topbar-left { color: #7aa2f7; font-weight: 500; }
        .topbar-right { display: flex; gap: 1rem; align-items: center; }
        .topbar a { color: #565f89; text-decoration: none; }
        .topbar a:hover { color: #c0caf5; }
        .user-name { color: #9ece6a; }

        /* textual.js uses these classes on body */
        .textual-terminal {
            flex: 1;
            overflow: hidden;
        }
        .intro-dialog {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #565f89;
            font-size: 1.1rem;
        }
        body.-first-byte .intro-dialog { display: none; }
        body.-first-byte .textual-terminal { visibility: visible; }

        .closed-dialog {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1b26;
            border: 1px solid #3b4261;
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            z-index: 100;
        }
        body.-closed .closed-dialog { display: block; }
        .closed-dialog h2 { color: #f7768e; margin-bottom: 0.5rem; }
        .closed-dialog a { color: #7aa2f7; text-decoration: none; }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-left">GKL Baseball</div>
        <div class="topbar-right">
            <span class="user-name">{{ user_name }}</span>
            <a href="/logout">Logout</a>
        </div>
    </div>

    <div class="intro-dialog">Connecting...</div>

    <div
        id="terminal"
        class="textual-terminal"
        data-session-websocket-url="wss://{{ host }}/ws"
        data-font-size="15"
    ></div>

    <div class="closed-dialog">
        <h2>Session Ended</h2>
        <p>Your terminal session has ended.</p>
        <p><a href="/app">Reconnect</a> | <a href="/logout">Logout</a></p>
    </div>
</body>
</html>
